name: Style Requirements Check

on:
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ main, master ]

jobs:
  style-check:
    runs-on: ubuntu-latest
    name: Check Styling Requirements
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

    - name: Create style checker script
      run: |
        cat > style_checker.py << 'EOF'
        import ast
        import sys
        import os
        import glob

        def check_file_headers(filename):
            """Check if file has required BSD header."""
            violations = []
            try:
                with open(filename, 'r', encoding='utf-8') as f:
                    content = f.read()
                
                if "Copyright (c) 2025 TAPS OSS" not in content:
                    violations.append(f"❌ {filename}: Missing required BSD-3-Clause copyright header")
                
                if "Licensed under the BSD-3-Clause License" not in content:
                    violations.append(f"❌ {filename}: Missing BSD-3-Clause license reference")
                    
            except Exception as e:
                violations.append(f"⚠️ {filename}: Could not read file - {e}")
            
            return violations

        def check_docstrings(filename):
            """Check if functions and classes have proper docstrings."""
            violations = []
            try:
                with open(filename, 'r', encoding='utf-8') as f:
                    content = f.read()
                
                tree = ast.parse(content, filename=filename)
                
                for node in ast.walk(tree):
                    if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                        # Skip private methods
                        if node.name.startswith('_'):
                            continue
                            
                        # Check if function has a docstring
                        if not (node.body and isinstance(node.body[0], ast.Expr) and 
                               isinstance(node.body[0].value, ast.Constant) and 
                               isinstance(node.body[0].value.value, str)):
                            violations.append(f"❌ {filename}: Function '{node.name}' (line {node.lineno}) missing docstring")
                        else:
                            docstring = node.body[0].value.value
                            # Check for basic docstring requirements
                            if len(docstring.strip()) < 10:
                                violations.append(f"❌ {filename}: Function '{node.name}' (line {node.lineno}) has insufficient docstring")
                            
                            # Check for Args: section if function has parameters (excluding self)
                            real_args = [arg for arg in node.args.args if arg.arg != 'self']
                            if real_args and 'Args:' not in docstring:
                                violations.append(f"❌ {filename}: Function '{node.name}' (line {node.lineno}) has parameters but no 'Args:' section in docstring")
                            
                            # Check for Returns: section if function has return annotation
                            if node.returns and 'Returns:' not in docstring:
                                violations.append(f"❌ {filename}: Function '{node.name}' (line {node.lineno}) has return annotation but no 'Returns:' section in docstring")
                    
                    elif isinstance(node, ast.ClassDef):
                        # Check if class has a docstring
                        if not (node.body and isinstance(node.body[0], ast.Expr) and 
                               isinstance(node.body[0].value, ast.Constant) and 
                               isinstance(node.body[0].value.value, str)):
                            violations.append(f"❌ {filename}: Class '{node.name}' (line {node.lineno}) missing docstring")
            
            except SyntaxError as e:
                violations.append(f"❌ {filename}: Syntax error - {e}")
            except Exception as e:
                violations.append(f"⚠️ {filename}: Could not parse file - {e}")
                
            return violations

        def main():
            """Main function to check all Python files."""
            # Find all Python files (excluding __pycache__ and .git)
            python_files = []
            for root, dirs, files in os.walk('.'):
                # Skip certain directories
                dirs[:] = [d for d in dirs if d not in ['.git', '__pycache__', '.pytest_cache']]
                for file in files:
                    if file.endswith('.py'):
                        python_files.append(os.path.join(root, file))
            
            if not python_files:
                print("No Python files found to check.")
                return 0
            
            print("Found Python files to check:")
            for f in python_files:
                print(f"  {f}")
            print()
            
            total_violations = 0
            files_with_violations = []
            
            # Check each Python file
            for file in python_files:
                print(f"Checking {file}...")
                file_violations = []
                
                # Check headers
                file_violations.extend(check_file_headers(file))
                
                # Check docstrings
                file_violations.extend(check_docstrings(file))
                
                if file_violations:
                    total_violations += len(file_violations)
                    files_with_violations.append(file)
                    for violation in file_violations:
                        print(violation)
                    print(f"❌ {file}: {len(file_violations)} styling violations found")
                else:
                    print(f"✅ {file}: No styling violations found")
                
                print()
            
            # Summary
            print("=" * 50)
            print("STYLING CHECK SUMMARY")
            print("=" * 50)
            print(f"Total violations found: {total_violations}")
            
            if total_violations > 0:
                print("Files with violations:")
                for f in files_with_violations:
                    print(f"  {f}")
                print()
                print("🔗 Please review the styling requirements:")
                print("https://github.com/TAPSOSS/Walrio/blob/main/CONTRIBUTING.md#styling-requirements")
                print()
                print("Required fixes:")
                print("1. Add proper BSD-3-Clause header to all new Python files")
                print("2. Add docstrings to all public functions and classes")
                print("3. Include 'Args:' section for functions with parameters")
                print("4. Include 'Returns:' section for functions with return annotations")
                print("5. Use Sphinx-compatible docstring formatting with Napoleon support")
                
                return 1
            else:
                print("✅ All styling requirements met!")
                return 0

        if __name__ == "__main__":
            sys.exit(main())
        EOF

    - name: Run style check
      id: style_check
      run: python3 style_checker.py

    - name: Comment on PR if violations found
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ❌ Styling Requirements Check Failed
            
            Your pull request has styling violations that need to be addressed before merging.
            
            ### 📋 Requirements
            
            Please ensure your code meets our styling requirements:
            
            1. **BSD-3-Clause Header**: All new Python files must include the required copyright header
            2. **Docstrings**: All public functions and classes need proper docstrings
            3. **Documentation Format**: Use Sphinx-compatible format with Napoleon support
            4. **Parameter Documentation**: Functions with parameters must have an \`Args:\` section
            5. **Return Documentation**: Functions with return annotations must have a \`Returns:\` section
            
            ### 📖 Detailed Guidelines
            
            Please review our full styling requirements:
            👉 **[Styling REQUIREMENTS](https://github.com/TAPSOSS/Walrio/blob/main/CONTRIBUTING.md#styling-requirements)**
            
            ### 🔧 Example Format
            
            \`\`\`python
            """
            Brief description of the file
            Copyright (c) 2025 TAPS OSS
            Project: https://github.com/TAPSOSS/Walrio
            Licensed under the BSD-3-Clause License (see LICENSE file for details)
            
            Longer description of what the file does.
            """
            
            class ExampleClass:
                """
                A class that demonstrates proper documentation.
                """
                
                def example_method(self, param1: str, param2: int) -> str:
                    """
                    Example method with proper documentation.
                    
                    Args:
                        param1 (str): Description of the first parameter.
                        param2 (int): Description of the second parameter.
                        
                    Returns:
                        str: Description of the return value.
                    """
                    return f"Result: {param1} - {param2}"
            \`\`\`
            
            ### ⚡ Quick Fix
            
            Once you've updated your code to meet the requirements, push your changes and this check will run automatically again.
            
            ---
            
            *This check helps maintain code quality and consistency across the project. Thank you for your contribution! 🎵*`
          });
